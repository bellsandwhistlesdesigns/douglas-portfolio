<!-- Deez Profile Page -->
<!DOCTYPE html>
<html lang="en">
<head>
	<link rel="stylesheet" href="CSS/base.css">
	<link rel="stylesheet" href="CSS/style.css">
	<link rel="stylesheet" href="CSS/style-dashboard.css">
	<link rel="stylesheet" href="CSS/style-navboard.css">
	<link rel="stylesheet" href="CSS/style-profile.css">
	
	<title>Deez User Profile</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
	
<main>
	<div class="profile">
		<h2>Profile: <span id="profileName"></span></h2>
		
		<section class="profile-settings">
			<label for="bio">Your Biography</label>
			<textarea id="bio" rows="3" placeholder="Let others know about you..."></textarea>
						
			<label for="themeColor">Change your colors:</label>
			<input type="color" id="themeColor" value="#222222">
			
			<button id="saveProfile">Save your changes</button>
		</section>
	
		<section class ="profile-extras">
			<h2>Random Quote of the Day!</h2>
			<p id="quoteOfDay"></p>
			
			<div class="progress-container">
				<h2>Deez Membership progress</h2>
				<div class="progress-bar">
					<div id="progressFill"></div>
				</div>
			</div>
		</section>
	</div>
</main>	
	<script src="SCRIPTS/database.js"></script>
	<script src="SCRIPTS/profile.js"></script>
	<script src="SCRIPTS/nav.js"></script>
	<script src="SCRIPTS/settings.js"></script>
</body>
</html>
